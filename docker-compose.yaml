services:

  frontend-webpack:
    image: node:24-alpine
    working_dir: /frontend
    volumes:
      - ./frontend:/frontend
    command: npm run dev:webpack

  postgres:
    image: postgres:16.2
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRESQL_DATABASE}
      POSTGRES_USER: ${POSTGRESQL_USERNAME}
      POSTGRES_PASSWORD: ${POSTGRESQL_PASSWORD}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRESQL_USERNAME} -d ${POSTGRESQL_DATABASE}"]
      interval: 10s
      timeout: 5s
      retries: 5

  migrate:
    build:
      context: .
      dockerfile: deploy/docker/Dockerfile.migrate
    env_file:
      - .env
    depends_on:
      postgres:
        condition: service_healthy
      authara-migrations:
        condition: service_completed_successfully
    command: ["up", "-env=default", "-config=/app/migrations/dbconfig.yaml"]
    restart: "no"

  __APP_SLUG__:
    build:
      context: .
      dockerfile: deploy/docker/Dockerfile.dev
    env_file:
      - .env
    volumes:
      - .:/app
    depends_on:
      migrate:
        condition: service_completed_successfully
    restart: unless-stopped

  gateway:
    image: ghcr.io/authara-org/authara-gateway:latest
    ports:
      - "3000:3000"
    environment:
      GATEWAY_BIND: :3000
      AUTHARA_UPSTREAM: authara:8080
      APP_UPSTREAM: __APP_SLUG__:8080
    depends_on:
      - authara
      - __APP_SLUG__

  authara-migrations:
    image: ghcr.io/authara-org/authara-migrations:latest
    env_file:
      - .env
    depends_on:
      postgres:
        condition: service_healthy
    command: ["up", "-env=default", "-config=dbconfig.yaml"]
    restart: "no"

  authara:
    image: ghcr.io/authara-org/authara-core:latest
    env_file:
      - .env
    depends_on:
      authara-migrations:
        condition: service_completed_successfully

volumes:
  postgres_data:
