services:
  postgres:
    image: postgres:16
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRESQL_DATABASE}
      POSTGRES_USER: ${POSTGRESQL_USERNAME}
      POSTGRES_PASSWORD: ${POSTGRESQL_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRESQL_USERNAME} -d ${POSTGRESQL_DATABASE}"]
      interval: 10s
      timeout: 5s
      retries: 5

  migrate:
    image: __IMAGE_REPOSITORY__-migrate:${MIGRATIONS_IMAGE_TAG}
    env_file:
      - .env
    depends_on:
      postgres:
        condition: service_healthy
    command: ["up", "-env=default", "-config=/app/migrations/dbconfig.yaml"]
    restart: "no"


  app:
    image: __IMAGE_REPOSITORY__:${APP_IMAGE_TAG}
    restart: unless-stopped
    depends_on:
      migrate:
        condition: service_completed_successfully
    env_file:
      - .env
    expose:
      - "8080"

  caddy:
    image: caddy:2.10
    restart: unless-stopped
    depends_on:
      - app
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config

volumes:
  postgres_data:
  caddy_data:
  caddy_config:
