services:
  postgres:
    image: postgres:16.2
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRESQL_DATABASE}
      POSTGRES_USER: ${POSTGRESQL_USERNAME}
      POSTGRES_PASSWORD: ${POSTGRESQL_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRESQL_USERNAME} -d ${POSTGRESQL_DATABASE}"]
      interval: 10s
      timeout: 5s
      retries: 5

  authara-migrations:
    image: ghcr.io/authara-org/authara-migrations:latest
    env_file:
      - .env
    depends_on:
      postgres:
        condition: service_healthy
    command: ["up", "-env=default", "-config=dbconfig.yaml"]
    restart: "no"

  authara:
    image: ghcr.io/authara-org/authara-core:latest
    env_file:
      - .env
    depends_on:
      authara-migrations:
        condition: service_completed_successfully
    restart: unless-stopped
    expose:
      - "8080"

  migrate:
    image: __IMAGE_REPOSITORY__-migrations:${MIGRATIONS_IMAGE_TAG}
    env_file:
      - .env
    depends_on:
      postgres:
        condition: service_healthy
      authara-migrations:
        condition: service_completed_successfully
    command: ["up", "-env=default", "-config=/app/migrations/dbconfig.yaml"]
    restart: "no"

  __APP_SLUG__:
    image: __IMAGE_REPOSITORY__:${APP_IMAGE_TAG}
    env_file:
      - .env
    depends_on:
      migrate:
        condition: service_completed_successfully
    restart: unless-stopped
    expose:
      - "8080"

  gateway:
    image: ghcr.io/authara-org/authara-gateway:latest
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    environment:
      GATEWAY_BIND: :80
      AUTHARA_UPSTREAM: authara:8080
      APP_UPSTREAM: __APP_SLUG__:8080
    depends_on:
      - authara
      - __APP_SLUG__

volumes:
  postgres_data:
