name: Deploy

on:
  push:
    branches: [main]

env:
  IMAGE_NAME: __IMAGE_REPOSITORY__
  MIGRATIONS_IMAGE_NAME: __IMAGE_REPOSITORY__-migrations

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    outputs:
      app_image_tag: ${{ steps.meta.outputs.app_image_tag }}
      migrations_image_tag: ${{ steps.meta.outputs.migrations_image_tag }}

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set image tags
        id: meta
        run: |
          echo "app_image_tag=${GITHUB_SHA}" >> "$GITHUB_OUTPUT"
          echo "migrations_image_tag=${GITHUB_SHA}" >> "$GITHUB_OUTPUT"

      - name: Set up Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push app image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: deploy/docker/Dockerfile
          push: true
          build-args: |
            VERSION=${{ steps.meta.outputs.app_image_tag }}
          tags: |
            ${{ env.IMAGE_NAME }}:${{ steps.meta.outputs.app_image_tag }}
            ${{ env.IMAGE_NAME }}:latest

      - name: Build and push migrations image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: deploy/docker/Dockerfile.migrate
          push: true
          tags: |
            ${{ env.MIGRATIONS_IMAGE_NAME }}:${{ steps.meta.outputs.migrations_image_tag }}
            ${{ env.MIGRATIONS_IMAGE_NAME }}:latest

  deploy:
    runs-on: ubuntu-latest
    needs: build-and-push

    steps:
      - name: Deploy over SSH
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          script: |
            set -euo pipefail

            APP_SLUG="__APP_SLUG__"
            DEPLOY_DIR="/opt/${APP_SLUG}"
            APP_TAG="${{ needs.build-and-push.outputs.app_image_tag }}"
            MIGRATIONS_TAG="${{ needs.build-and-push.outputs.migrations_image_tag }}"

            cd "$DEPLOY_DIR"

            echo "Updating .env"
            sed -i "s/^APP_IMAGE_TAG=.*/APP_IMAGE_TAG=${APP_TAG}/" .env || \
              echo "APP_IMAGE_TAG=${APP_TAG}" >> .env

            sed -i "s/^MIGRATIONS_IMAGE_TAG=.*/MIGRATIONS_IMAGE_TAG=${MIGRATIONS_TAG}/" .env || \
              echo "MIGRATIONS_IMAGE_TAG=${MIGRATIONS_TAG}" >> .env

            echo "Pulling images..."
            docker compose -f docker-compose.prod.yaml --env-file .env pull

            echo "Starting containers..."
            docker compose -f docker-compose.prod.yaml --env-file .env up -d

            echo "Deploy complete"
