name: CI

on:
  pull_request:
  push:
    branches: [main]

env:
  GO_VERSION: "1.25.1"
  NODE_VERSION: "24"

jobs:
  # ------------------------------------------------------------
  # Backend: lint + test
  # ------------------------------------------------------------
  backend-test:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_DB: __APP_SLUG___test
          POSTGRES_USER: __APP_SLUG__
          POSTGRES_PASSWORD: __APP_SLUG__
        ports:
          - 5432:5432
        options: >-
          --health-cmd="pg_isready -U __APP_SLUG__ -d __APP_SLUG___test"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5

    env:
      APP_ENV: dev
      PUBLIC_URL: http://localhost
      POSTGRESQL_HOST: localhost
      POSTGRESQL_PORT: 5432
      POSTGRESQL_DATABASE: __APP_SLUG___test
      POSTGRESQL_USERNAME: __APP_SLUG__
      POSTGRESQL_PASSWORD: __APP_SLUG__
      POSTGRESQL_SCHEMA: __APP_SLUG__
      POSTGRESQL_TIMEZONE: UTC
      POSTGRESQL_LOG_SQL: false
      POSTGRESQL_MAX_OPEN_CONNS: 25
      POSTGRESQL_MAX_IDLE_CONNS: 25
      POSTGRESQL_CONN_MAX_LIFETIME: 5m
      POSTGRESQL_CONN_MAX_IDLE_TIME: 5m

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}

      - name: Wait for Postgres
        run: |
          until pg_isready -h localhost -p 5432 -U __APP_SLUG__ -d __APP_SLUG___test; do
            echo "waiting for postgres..."
            sleep 2
          done

      - name: Build migrations image
        run: |
          docker build \
            -f deploy/docker/Dockerfile.migrate \
            -t __APP_SLUG__-migrations:test \
            .

      - name: Apply database migrations
        run: |
          docker run --rm \
            --network host \
            -e POSTGRESQL_HOST \
            -e POSTGRESQL_PORT \
            -e POSTGRESQL_DATABASE \
            -e POSTGRESQL_USERNAME \
            -e POSTGRESQL_PASSWORD \
            -e POSTGRESQL_SCHEMA \
            __APP_SLUG__-migrations:test \
            up \
            -env=default \
            -config=/app/migrations/dbconfig.yaml

      - name: Install goimports
        run: go install golang.org/x/tools/cmd/goimports@v0.41.0

      - name: Check goimports formatting
        run: |
          export PATH="$PATH:$(go env GOPATH)/bin"
          files=$(git ls-files '*.go' ':!**/*_templ.go')
          test -z "$(goimports -l $files)"

      - name: Install templ
        run: go install github.com/a-h/templ/cmd/templ@v0.3.1001

      - name: Generate templ files
        run: |
          export PATH="$PATH:$(go env GOPATH)/bin"
          templ generate

      - name: Run go vet
        run: go vet ./...

      - name: Run Go tests
        run: go test ./...

  # ------------------------------------------------------------
  # Frontend: format + build
  # ------------------------------------------------------------
  frontend-build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Node
        uses: actions/setup-node@v5
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Build frontend
        working-directory: frontend
        run: npm run build

      - name: Check formatting
        working-directory: frontend
        run: npm run format:check

  # ------------------------------------------------------------
  # Docker build (main branch only)
  # ------------------------------------------------------------
  docker-build:
    runs-on: ubuntu-latest
    needs: [backend-test, frontend-build]
    if: github.ref == 'refs/heads/main'

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - uses: docker/setup-qemu-action@v3
      - uses: docker/setup-buildx-action@v3

      - name: Build app image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: deploy/docker/Dockerfile
          push: false
          tags: __IMAGE_REPOSITORY__:ci
